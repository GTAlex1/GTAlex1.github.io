<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Captaciones - Comarca de Jerez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-panel {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #4CAF50;
            margin: 0;
            text-transform: uppercase;
        }
        .btn-logout {
            padding: 8px 15px;
            background-color: #cf4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Panel de Filtros y Búsqueda */
        .filter-panel {
            max-width: 800px;
            margin: 0 auto 20px auto;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            border-bottom: 3px solid #4CAF50;
        }
        @media (max-width: 768px) {
            .filter-panel {
                grid-template-columns: 1fr;
            }
        }
        .filter-panel input, .filter-panel select, .filter-panel button {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #3b3b3b;
            padding: 10px 12px;
            border-radius: 5px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9em;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        .filter-panel input:focus, .filter-panel select:focus {
            border-color: #4CAF50;
        }
        .btn-clear {
            background-color: #333333 !important;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background-color 0.2s;
        }
        .btn-clear:hover {
            background-color: #444444 !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .jugador-card {
            background-color: #1e1e1e;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            border-left: 4px solid #4CAF50;
        }
        .jugador-card:hover {
            transform: translateX(5px);
            background-color: #252525;
        }
        .jugador-nombre {
            font-weight: 600;
            font-size: 1.1em;
        }
        .jugador-posicion {
            background-color: #2a2a2a;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: #4CAF50;
            font-weight: bold;
        }
        
        /* Estilos del Modal (Perfil Completo) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #aaa;
        }
        .close-modal:hover { color: #fff; }
        
        .profile-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #333;
            border: 2px solid #4CAF50;
        }
        .profile-title h3 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4em;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .info-item {
            font-size: 0.95em;
        }
        .info-item strong {
            color: #4CAF50;
            display: block;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .info-full {
            grid-column: span 2;
            background-color: #262626;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="header-panel">
    <h2>Panel de Captaciones</h2>
    <button class="btn-logout" id="btnLogout">Salir</button>
</div>

<div class="filter-panel">
    <input type="text" id="searchNombre" placeholder="Buscar por nombre...">
    
    <select id="filterPosicion">
        <option value="todos">Posición</option>
        <option value="Portero">Portero</option>
        <option value="Central">Central</option>
        <option value="Lateral">Lateral</option>
        <option value="Medio centro">Medio centro</option>
        <option value="Delantero">Delantero</option>
    </select>

    <select id="filterPierna">
        <option value="todos">Pierna</option>
        <option value="Derecha">Derecha</option>
        <option value="Izquierda">Izquierda</option>
        <option value="Ambidiestro">Ambidiestro</option>
    </select>

    <select id="sortFecha">
        <option value="desc">Recientes primero</option>
        <option value="asc">Antiguos primero</option>
        <option value="notas">Con observaciones</option>
    </select>

    <button class="btn-clear" id="btnLimpiar">Limpiar</button>
</div>

<div class="container" id="listaJugadores">
    <p style="text-align: center; color: #888;">Cargando aspirantes...</p>
</div>

<div class="modal" id="perfilModal">
    <div class="modal-content">
        <span class="close-modal" id="closeModal">&times;</span>
        <div class="profile-header">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150' viewBox='0 0 150 150'><rect width='100%' height='100%' fill='%232a2a2a'/><text x='50%' y='50%' font-family='sans-serif' font-size='14' font-weight='bold' fill='%23888' dominant-baseline='middle' text-anchor='middle'>SIN FOTO</text></svg>" alt="Foto Jugador" class="profile-img" id="pFoto">
            <div class="profile-title">
                <h3 id="pNombre">Nombre Completo</h3>
                <span class="jugador-posicion" id="pPosicion">Posición</span>
            </div>
        </div>
        <div class="profile-grid">
            <div class="info-item"><strong>Teléfono</strong><span id="pTelefono"></span></div>
            <div class="info-item"><strong>Edad</strong><span id="pEdad"></span> años</div>
            <div class="info-item"><strong>Pierna Dominante</strong><span id="pPierna"></span></div>
            <div class="info-item"><strong>Físico</strong><span id="pFisico"></span></div>
            <div class="info-item" style="grid-column: span 2;"><strong>Último Equipo</strong><span id="pEquipo"></span></div>
            <div class="info-item info-full"><strong>Observaciones del Jugador</strong><p id="pNotas" style="margin: 5px 0 0 0; font-size: 0.9em; color: #ccc;"></p></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyCtGIdiB6TX4tmSJDypRKpBA3QYEW6BpyU",
        authDomain: "captacion-comarca.firebaseapp.com",
        projectId: "captacion-comarca",
        storageBucket: "captacion-comarca.firebasestorage.app",
        messagingSenderId: "566356053681",
        appId: "1:566356053681:web:3c525086a5587b0484dc90"
    };

    console.log("1. Inicializando Firebase...");
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Variable interna para cachear el listado y filtrar de forma local instantánea
    let cacheJugadores = [];

    // 1. Verificar estado de autenticación
    console.log("2. Escuchando estado de autenticación (onAuthStateChanged)...");
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            console.warn("Mister no logueado. Redirigiendo a login.html");
            window.location.href = 'login.html';
        } else {
            console.log("3. Mister autenticado correctamente:", user.email);
            cargarJugadores();
        }
    });

    // 2. Función para leer los jugadores de Firestore
    async function cargarJugadores() {
        const listaContenedor = document.getElementById('listaJugadores');
        console.log("4. Iniciando consulta a Firestore...");
        
        try {
            // Descarga inicial ordenada por fecha por defecto
            const q = query(collection(db, "jugadores"), orderBy("fechaRegistro", "desc"));
            
            console.log("5. Ejecutando getDocs(). Apuntando al servidor...");
            const querySnapshot = await getDocs(q); 
            console.log("6. ¡Respuesta de Firestore recibida con éxito!");
            
            if(querySnapshot.empty) {
                console.log("El snapshot está vacío. No hay jugadores.");
                listaContenedor.innerHTML = '<p style="text-align: center; color: #888;">Aún no se ha apuntado ningún jugador.</p>';
                return;
            }

            // Almacenar en la caché local para no volver a consumir lecturas en la base de datos al buscar
            cacheJugadores = [];
            querySnapshot.forEach((doc) => {
                cacheJugadores.push({ id: doc.id, ...doc.data() });
            });

            // Enlazar los eventos de escucha del panel de filtrado
            document.getElementById('searchNombre').addEventListener('input', aplicarFiltros);
            document.getElementById('filterPosicion').addEventListener('change', aplicarFiltros);
            document.getElementById('filterPierna').addEventListener('change', aplicarFiltros);
            document.getElementById('sortFecha').addEventListener('change', aplicarFiltros);
            document.getElementById('btnLimpiar').addEventListener('click', limpiarFiltros);

            // Renderizar la lista inicial
            renderizarLista(cacheJugadores);
            console.log(`7. Se han guardado y renderizado ${cacheJugadores.length} tarjetas de jugadores.`);

        } catch (error) {
            console.error("❌ Error crítico en cargarJugadores: ", error);
            listaContenedor.innerHTML = '<p style="text-align: center; color: #ff4a4a;">Error al cargar los datos. Revisa las reglas de Firestore o la consola.</p>';
        }
    }

    // 3. Función exclusiva para pintar los elementos filtrados en el DOM
    function renderizarLista(lista) {
        const listaContenedor = document.getElementById('listaJugadores');
        listaContenedor.innerHTML = ''; // Limpiar listado anterior

        if (lista.length === 0) {
            listaContenedor.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">No hay ningún jugador que coincida con los filtros.</p>';
            return;
        }

        lista.forEach((jugador) => {
            const card = document.createElement('div');
            card.className = 'jugador-card';
            card.innerHTML = `
                <span class="jugador-nombre">${jugador.nombre}</span>
                <span class="jugador-posicion">${jugador.posicion}</span>
            `;
            
            card.addEventListener('click', () => abrirPerfil(jugador));
            listaContenedor.appendChild(card);
        });
    }

    // 4. Lógica de Filtrado y Ordenación Dinámica en Memoria
    function aplicarFiltros() {
        const busqueda = document.getElementById('searchNombre').value.toLowerCase().trim();
        const posicionSel = document.getElementById('filterPosicion').value;
        const piernaSel = document.getElementById('filterPierna').value;
        const ordenSel = document.getElementById('sortFecha').value;

        let resultado = cacheJugadores.filter(jugador => {
            // Búsqueda por texto (Nombre)
            const cumpleNombre = jugador.nombre ? jugador.nombre.toLowerCase().includes(busqueda) : false;
            
            // Filtro de Posición
            const cumplePosicion = (posicionSel === 'todos') || (jugador.posicion === posicionSel);
            
            // Filtro de Pierna Dominante
            const cumplePierna = (piernaSel === 'todos') || (jugador.pierna === piernaSel);
            
            // Filtro Con Observaciones (Excluye vacíos o el texto genérico)
            const cumpleNotas = (ordenSel !== 'notas') || 
                (jugador.notas && jugador.notas.trim() !== "" && jugador.notas !== "Sin observaciones adicionales." && jugador.notas !== "Sin observaciones adicionales");

            return cumpleNombre && cumplePosicion && cumplePierna && cumpleNotas;
        });

        // Ordenar según los timestamps de registro
        if (ordenSel === 'asc') {
            resultado.sort((a, b) => (a.fechaRegistro?.seconds || 0) - (b.fechaRegistro?.seconds || 0));
        } else if (ordenSel === 'desc') {
            resultado.sort((a, b) => (b.fechaRegistro?.seconds || 0) - (a.fechaRegistro?.seconds || 0));
        }

        renderizarLista(resultado);
    }

    // 5. Función del botón Limpiar para restablecer el panel
    function limpiarFiltros() {
        document.getElementById('searchNombre').value = '';
        document.getElementById('filterPosicion').value = 'todos';
        document.getElementById('filterPierna').value = 'todos';
        document.getElementById('sortFecha').value = 'desc';
        renderizarLista(cacheJugadores);
    }

    // 6. Rellenar y desplegar el modal del perfil de forma segura
    function abrirPerfil(jugador) {
        document.getElementById('pNombre').innerText = jugador.nombre;
        document.getElementById('pPosicion').innerText = jugador.posicion;
        document.getElementById('pTelefono').innerText = jugador.telefono;
        document.getElementById('pEdad').innerText = jugador.edad;
        document.getElementById('pPierna').innerText = jugador.pierna;
        document.getElementById('pFisico').innerText = `${jugador.altura || '--'} cm / ${jugador.peso || '--'} kg`;
        document.getElementById('pEquipo').innerText = jugador.equipo_anterior || "Ninguno / Agente libre";
        document.getElementById('pNotas').innerText = jugador.notes || jugador.notas || "Sin observaciones adicionales.";
        
        const imgElement = document.getElementById('pFoto');
        const fotoPorDefecto = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150' viewBox='0 0 150 150'><rect width='100%' height='100%' fill='%232a2a2a'/><text x='50%' y='50%' font-family='sans-serif' font-size='14' font-weight='bold' fill='%23888' dominant-baseline='middle' text-anchor='middle'>SIN FOTO</text></svg>";

        // FUNCIÓN INTERNA: Convierte el enlace de visor de Drive a enlace de imagen directa
        function convertirEnlaceDrive(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                // Extrae el ID largo de la foto mediante una expresión regular, ya venga en el path (/d/) o en la query (?id=)
                const matchFile = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                const matchQuery = url.match(/[?&]id=([a-zA-Z0-9-_]+)/);
                
                const id = (matchFile && matchFile[1]) || (matchQuery && matchQuery[1]);
                
                if (id) {
                    // FUNCIÓN INTERNA: Convierte el enlace de visor de Drive a enlace de imagen directa (vía Thumbnail)
                    function convertirEnlaceDrive(url) {
                        if (!url) return "";
                        if (url.includes("drive.google.com")) {
                            const matchFile = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                            const matchQuery = url.match(/[?&]id=([a-zA-Z0-9-_]+)/);
                            
                            const id = (matchFile && matchFile[1]) || (matchQuery && matchQuery[1]);
                            
                            if (id) {
                                // CAMBIO AQUÍ: Usamos el endpoint de thumbnail con un tamaño máximo de 500px
                                // Este endpoint es mucho más permisivo con los dominios educativos
                                return `https://drive.google.com/thumbnail?id=${id}&sz=w500`;
                }
            }
            return url;
        }
                }
            }
            return url; // Si no es de Drive, lo devuelve tal cual
        }

        // Aplicamos la conversión antes de meterla en el src
        if (jugador.foto && jugador.foto.trim() !== "" && !jugador.foto.includes("Buscar en Drive")) {
            imgElement.src = convertirEnlaceDrive(jugador.foto);
        } else {
            imgElement.src = fotoPorDefecto;
        }

        document.getElementById('perfilModal').style.display = 'flex';
    }

    // Cerrar el modal
    document.getElementById('closeModal').addEventListener('click', () => {
        document.getElementById('perfilModal').style.display = 'none';
    });

    // Cerrar sesión
    document.getElementById('btnLogout').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = 'login.html';
        });
    });
</script>
</body>
</html>
